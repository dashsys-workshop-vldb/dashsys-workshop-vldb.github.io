[project]
name = "dashagent"
version = "0.1.0"
description = "Deterministic schema-guided DASHSys QA agent over DuckDB/parquet and Adobe APIs"
requires-python = ">=3.11"
dependencies = [
  "duckdb>=0.10.0",
  "pandas>=2.0.0",
  "pyarrow>=14.0.0",
  "pydantic>=2.0.0",
  "requests>=2.31.0",
  "python-dotenv>=1.0.0",
  "rapidfuzz>=3.0.0",
  "pytest>=8.0.0",
  "tiktoken>=0.7.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
